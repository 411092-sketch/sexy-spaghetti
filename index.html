<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>英文單字翻面卡</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <!-- 導航欄 -->
    <nav class="navbar">
        <div class="nav-container">
            <h1 class="logo">📚 英文單字卡</h1>
            <ul class="nav-links">
                <li><a href="#" class="nav-link active" data-page="home">首頁</a></li>
                <li><a href="#" class="nav-link" data-page="admin">管理</a></li>
            </ul>
        </div>
    </nav>

    <!-- 首頁 -->
    <div id="home" class="page active">
        <main>
            <section class="header">
                <h1>翻面單字卡</h1>
                <p>點擊單字卡查看中文解釋、詞性、例句與字根分析。</p>
            </section>
            <section class="card-grid" id="cardGrid"></section>
        </main>
    </div>

    <!-- 管理頁面 -->
    <div id="admin" class="page">
        <main>
            <section class="admin-header">
                <h1>單字管理</h1>
                <p>新增或刪除英文單字</p>
            </section>

            <div class="admin-container">
                <!-- 新增單字表單 -->
                <section class="admin-section form-section">
                    <h2>新增單字</h2>
                    <form id="addWordForm" class="add-form">
                        <div class="form-group">
                            <label for="word">英文單字:</label>
                            <input type="text" id="word" required placeholder="例：Apple">
                        </div>
                        <div class="form-group">
                            <label for="meaning">中文解釋:</label>
                            <input type="text" id="meaning" required placeholder="例：蘋果">
                        </div>
                        <div class="form-group">
                            <label for="partOfSpeech">詞性:</label>
                            <input type="text" id="partOfSpeech" required placeholder="例：n. (名詞)">
                        </div>
                        <div class="form-group">
                            <label for="example">例句:</label>
                            <textarea id="example" required rows="2" placeholder="例：The apple is red."></textarea>
                        </div>
                        <div class="form-group">
                            <label for="rootAnalysis">字根分析:</label>
                            <textarea id="rootAnalysis" required rows="2" placeholder="例：app + le"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">+ 新增單字</button>
                    </form>
                </section>

                <!-- 單字列表 -->
                <section class="admin-section list-section">
                    <h2>現有單字 (<span id="wordCount">0</span>)</h2>
                    <div id="wordList" class="word-list"></div>
                </section>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
